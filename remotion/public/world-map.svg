<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" style="background:#111">
  <!-- Simplified world map — public domain, approximate continent outlines -->
  <!-- Mercator-like projection: lon -180→180 = x 0→1000, lat 85→-85 = y 0→500 -->

  <g id="north_america" fill="#2a2a2a" stroke="#444" stroke-width="0.5">
    <polygon points="33,75 80,50 160,42 250,38 320,45 356,62 358,90 340,120 330,155 310,185 270,205 230,215 185,220 150,205 110,185 80,160 55,140 38,115 30,90"/>
  </g>
  <g id="south_america" fill="#2a2a2a" stroke="#444" stroke-width="0.5">
    <polygon points="220,215 272,215 310,230 345,255 358,285 350,330 325,375 290,405 260,415 230,410 200,390 185,360 180,320 188,280 200,250"/>
  </g>
  <g id="europe" fill="#2a2a2a" stroke="#444" stroke-width="0.5">
    <polygon points="472,56 490,44 520,40 545,45 568,55 580,68 582,88 568,108 548,120 525,130 505,135 480,130 460,118 452,100 454,76"/>
  </g>
  <g id="africa" fill="#2a2a2a" stroke="#444" stroke-width="0.5">
    <polygon points="450,145 485,138 525,135 565,140 600,155 622,175 638,210 640,250 630,295 610,335 578,350 540,355 500,345 465,320 448,290 438,250 440,195"/>
  </g>
  <g id="middle_east" fill="#2a2a2a" stroke="#444" stroke-width="0.5">
    <polygon points="569,128 608,120 645,126 666,140 676,158 668,195 645,212 610,218 578,210 558,192 546,168 551,142"/>
  </g>
  <g id="asia" fill="#2a2a2a" stroke="#444" stroke-width="0.5">
    <polygon points="569,26 650,20 750,16 850,18 960,22 1000,40 1000,250 960,268 900,280 850,285 800,278 760,258 745,225 730,190 718,155 695,138 666,130 638,120 610,112 590,96 575,72"/>
  </g>
  <g id="oceania" fill="#2a2a2a" stroke="#444" stroke-width="0.5">
    <polygon points="818,252 870,240 920,245 960,255 985,272 988,295 965,330 930,355 885,365 845,360 810,340 792,315 788,285"/>
  </g>

  <!-- Graticule lines (light grid) -->
  <g stroke="#1e1e1e" stroke-width="0.3" fill="none">
    <line x1="0" y1="125" x2="1000" y2="125"/> <!-- 45°N -->
    <line x1="0" y1="250" x2="1000" y2="250"/> <!-- equator -->
    <line x1="0" y1="375" x2="1000" y2="375"/> <!-- 45°S -->
    <line x1="250" y1="0" x2="250" y2="500"/>  <!-- -90° -->
    <line x1="500" y1="0" x2="500" y2="500"/>  <!-- 0° prime -->
    <line x1="750" y1="0" x2="750" y2="500"/>  <!-- 90°E -->
  </g>
</svg>
